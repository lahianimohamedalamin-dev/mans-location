<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a1940" />
    <meta name="description" content="MAN'S LOCATION — Gestion de location de véhicules" />

    <!-- ========== SECURITY HEADERS ========== -->
    <!-- Empêche le clickjacking (chargement dans des iframes) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- Contrôle le referrer envoyé dans les requêtes externes -->
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <!-- Désactive les fonctionnalités navigateur non utilisées -->
    <meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=(), payment=()" />
    <!-- NOTE : Content-Security-Policy et X-Content-Type-Options doivent
         être configurés côté serveur (Vercel/Netlify headers, Nginx, etc.)
         pour fonctionner correctement. -->
    <!-- ======================================= -->

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>MAN'S LOCATION</title>
  </head>
  <body>
    <noscript>JavaScript est requis pour utiliser cette application.</noscript>
    <div id="root"></div>
  </body>
</html>
