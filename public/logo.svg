<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Fond noir -->
  <rect width="500" height="500" fill="#000000"/>

  <!-- Silhouette voiture jaune - ligne du bas -->
  <line x1="80" y1="242" x2="420" y2="242" stroke="#f5c400" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Silhouette voiture jaune - carrosserie extérieure -->
  <path d="M80 242 Q110 242 150 210 Q200 170 250 162 Q310 155 360 175 Q395 190 420 242"
        fill="none" stroke="#f5c400" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ligne intérieure (toit/vitre) -->
  <path d="M155 210 Q195 178 248 170 Q300 163 348 180 Q375 190 395 210"
        fill="none" stroke="#f5c400" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- MAN'S LOC en blanc -->
  <text x="250" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="6">MAN'S LOC</text>

  <!-- LOCATION DE VÉHICULE en jaune -->
  <text x="250" y="338" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#f5c400" text-anchor="middle" letter-spacing="5">LOCATION DE VÉHICULE</text>
</svg>
