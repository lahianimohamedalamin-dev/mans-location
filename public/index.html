<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a1940" />
    <meta name="description" content="MAN'S LOCATION — Gestion de location de véhicules" />

    <!-- ========== SECURITY HEADERS ========== -->
    <!-- Content Security Policy : restreint les sources autorisées -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      img-src 'self' data: blob: https://*.supabase.co;
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
    " />
    <!-- Empêche le sniffing de type MIME -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Contrôle le referrer envoyé dans les requêtes -->
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <!-- Désactive les fonctionnalités navigateur inutiles -->
    <meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=(), payment=()" />
    <!-- ======================================= -->

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>MAN'S LOCATION</title>
  </head>
  <body>
    <noscript>JavaScript est requis pour utiliser cette application.</noscript>
    <div id="root"></div>
  </body>
</html>
